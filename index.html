<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Tracker — Serrure Métal Art</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#c8a96e;--gold-dark:#8b6914;--bg:#0c0c0c;--card:#161616;--border:#2a2a2a;--cream:#f5f0e8;--text:#e8e2d6;--muted:#666;--dim:#444}
    body{background:var(--bg);font-family:'DM Mono','Courier New',monospace;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background-image:radial-gradient(ellipse at 20% 20%,rgba(200,169,110,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(200,169,110,.03) 0%,transparent 60%)}
    .wrapper{width:100%;max-width:460px;animation:fadeUp .6s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .header{text-align:center;margin-bottom:28px}
    .header-eyebrow{font-size:10px;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
    .header-title{font-family:'Playfair Display',Georgia,serif;font-size:24px;color:var(--cream);letter-spacing:.04em}
    .header-rule{width:48px;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-dark));margin:12px auto 0}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .qr-section{background:var(--cream);padding:28px 24px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;position:relative}
    .corner{position:absolute;width:16px;height:16px}
    .corner--tl{top:10px;left:10px;border-top:2px solid #1a1a1a;border-left:2px solid #1a1a1a}
    .corner--tr{top:10px;right:10px;border-top:2px solid #1a1a1a;border-right:2px solid #1a1a1a}
    .corner--bl{bottom:10px;left:10px;border-bottom:2px solid #1a1a1a;border-left:2px solid #1a1a1a}
    .corner--br{bottom:10px;right:10px;border-bottom:2px solid #1a1a1a;border-right:2px solid #1a1a1a}
    #qr-container{width:220px;height:220px;display:flex;align-items:center;justify-content:center}
    #qr-container canvas{display:block}
    #qr-loading{font-size:12px;color:#999}
    .btn-open{background:#1a1a1a;color:var(--gold);border:none;border-radius:6px;padding:10px 28px;font-size:12px;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:background .2s,color .2s}
    .btn-open:hover{background:var(--gold);color:#1a1a1a}
    .url-row{display:flex;align-items:center;gap:8px;font-size:10px;color:#888}
    .btn-copy{background:none;border:1px solid #bbb;border-radius:4px;padding:2px 8px;font-size:9px;cursor:pointer;color:#888;font-family:monospace;transition:color .2s,border-color .2s}
    .btn-copy.copied{color:#4caf50;border-color:#4caf50}
    .stats-section{padding:20px 24px 24px}
    .sync-status{font-size:10px;letter-spacing:.1em;margin-bottom:14px;padding:6px 10px;border-radius:4px;text-align:center;transition:all .3s}
    .sync-status.synced{color:#4caf50;background:rgba(76,175,80,.08);border:1px solid rgba(76,175,80,.2)}
    .sync-status.syncing{color:var(--gold);background:rgba(200,169,110,.08);border:1px solid rgba(200,169,110,.2)}
    .sync-status.error{color:#e57373;background:rgba(229,115,115,.08);border:1px solid rgba(229,115,115,.2)}
    .counter-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .counter-label{font-size:10px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:4px}
    .counter-value{font-size:52px;font-weight:700;color:var(--gold);line-height:1;font-variant-numeric:tabular-nums;font-family:'Playfair Display',serif}
    .btn-reset{background:none;border:1px solid var(--border);color:var(--dim);border-radius:6px;padding:6px 14px;font-size:10px;cursor:pointer;font-family:monospace;letter-spacing:.1em;transition:border-color .2s,color .2s}
    .btn-reset:hover{border-color:#c0392b;color:#c0392b}
    .history-block{border-top:1px solid #222;padding-top:16px}
    .history-label{font-size:10px;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px}
    .history-empty{color:var(--dim);font-size:12px;font-style:italic}
    .history-list{max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .history-item{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:4px;border-left:2px solid transparent}
    .history-item.latest{background:#1f1f1f;border-left-color:var(--gold)}
    .history-num{color:var(--dim);font-size:10px}
    .history-date{color:#999;font-size:11px}
    .history-badge{margin-left:auto;font-size:9px;color:var(--gold);letter-spacing:.1em}
    .footer{text-align:center;color:var(--dim);font-size:10px;margin-top:18px;line-height:1.7;letter-spacing:.05em}
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="header-eyebrow">Tableau de suivi</div>
    <h1 class="header-title">Serrure Métal Art</h1>
    <div class="header-rule"></div>
  </div>
  <div class="card">
    <div class="qr-section">
      <div class="corner corner--tl"></div>
      <div class="corner corner--tr"></div>
      <div class="corner corner--bl"></div>
      <div class="corner corner--br"></div>
      <div id="qr-container"><span id="qr-loading">Génération du QR code…</span></div>
      <button class="btn-open" onclick="handleOpen()">↗ Ouvrir le site</button>
      <div class="url-row">
        <span>https://www.serrure-metal-art.fr</span>
        <button class="btn-copy" id="copy-btn" onclick="handleCopy()">copier</button>
      </div>
    </div>
    <div class="stats-section">
      <div class="sync-status syncing" id="sync-status">⟳ Connexion…</div>
      <div class="counter-row">
        <div>
          <div class="counter-label">Visites enregistrées</div>
          <div class="counter-value" id="counter-display">000</div>
        </div>
        <button class="btn-reset" onclick="handleReset()">Reset</button>
      </div>
      <div class="history-block">
        <div class="history-label">Historique récent</div>
        <div class="history-empty" id="history-empty">Aucune visite enregistrée pour l'instant.</div>
        <div class="history-list" id="history-list"></div>
      </div>
    </div>
  </div>
  <p class="footer">Compteur partagé entre tous les appareils.<br/>Chaque scan est enregistré en temps réel.</p>
</div>

function setStatus(msg, cls) {
  const el = document.getElementById("sync-status");
  el.textContent = msg;
  el.className = "sync-status " + cls;
}

async function fetchData() {
  const r = await fetch(BASE + "/latest", {
    headers: { "X-Master-Key": API_KEY, "X-Bin-Meta": "false" }
  });
  if (!r.ok) { const t = await r.text(); throw new Error(r.status + ": " + t); }
  return await r.json();
}

async function saveData(data) {
  const r = await fetch(BASE, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error("Save " + r.status);
}

async function loadRemote() {
  try {
    setStatus("⟳ Chargement…", "syncing");
    const data = await fetchData();
    renderCounter(data.count || 0);
    renderHistory(data.history || []);
    setStatus("✓ Synchronisé — " + new Date().toLocaleTimeString("fr-FR"), "synced");
  } catch(e) {
    console.error(e);
    setStatus("✗ Erreur : " + e.message, "error");
  }
}

async function handleOpen() {
  try {
    setStatus("⟳ Enregistrement…", "syncing");
    const data = await fetchData();
    const count = (data.count || 0) + 1;
    const date = new Date().toLocaleDateString("fr-FR", {day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
    const history = [{date, id:Date.now()}, ...(data.history||[])].slice(0,50);
    await saveData({count, history});
    renderCounter(count);
    renderHistory(history);
    setStatus("✓ Scan enregistré — " + new Date().toLocaleTimeString("fr-FR"), "synced");
  } catch(e) {
    console.error(e);
    setStatus("✗ Erreur : " + e.message, "error");
  }
  window.open(TARGET_URL, "_blank");
}

async function handleReset() {
  if (!confirm("Remettre le compteur à zéro ?")) return;
  try {
    await saveData({count:0, history:[]});
    renderCounter(0); renderHistory([]);
    setStatus("✓ Remis à zéro", "synced");
  } catch(e) { setStatus("✗ Erreur reset", "error"); }
}

function handleCopy() {
  navigator.clipboard.writeText(TARGET_URL).then(() => {
    const btn = document.getElementById("copy-btn");
    btn.textContent="✓"; btn.classList.add("copied");
    setTimeout(()=>{ btn.textContent="copier"; btn.classList.remove("copied"); },2000);
  });
}

function renderCounter(n) {
  document.getElementById("counter-display").textContent = String(n).padStart(3,"0");
}

function renderHistory(hist) {
  const empty = document.getElementById("history-empty");
  const list  = document.getElementById("history-list");
  if (!hist.length) { empty.style.display="block"; list.innerHTML=""; return; }
  empty.style.display="none";
  list.innerHTML = hist.map((e,i) => '<div class="history-item ' + (i===0?"latest":"") + '">'
    + '<span class="history-num">#' + String(hist.length-i).padStart(3,"0") + '</span>'
    + '<span class="history-date">' + e.date + '</span>'
    + (i===0 ? '<span class="history-badge">dernier</span>' : '')
    + '</div>').join("");
}

function buildQR() {
  const container = document.getElementById("qr-container");
  const tmpDiv = document.createElement("div");
  tmpDiv.style.cssText="position:absolute;visibility:hidden;top:-9999px";
  document.body.appendChild(tmpDiv);
  new QRCode(tmpDiv,{text:TARGET_URL,width:220,height:220,colorDark:"#1a1a1a",colorLight:"#f5f0e8",correctLevel:QRCode.CorrectLevel.H});
  setTimeout(()=>{
    const qrCanvas=tmpDiv.querySelector("canvas");
    if(!qrCanvas){document.body.removeChild(tmpDiv);return;}
    const canvas=document.createElement("canvas");
    canvas.width=canvas.height=220;
    const ctx=canvas.getContext("2d");
    ctx.drawImage(qrCanvas,0,0,220,220);
    const cx=110,cy=110,r=30;
    ctx.beginPath();ctx.arc(cx,cy,r+5,0,Math.PI*2);ctx.fillStyle="#f5f0e8";ctx.fill();
    const logo=new Image();
    logo.onload=()=>{
      ctx.save();ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.clip();
      ctx.drawImage(logo,cx-r,cy-r,r*2,r*2);ctx.restore();
      document.getElementById("qr-loading").style.display="none";
      container.innerHTML="";container.appendChild(canvas);document.body.removeChild(tmpDiv);
    };
    logo.onerror=()=>{
      document.getElementById("qr-loading").style.display="none";
      container.innerHTML="";container.appendChild(canvas);document.body.removeChild(tmpDiv);
    };
    logo.src="data:image/jpeg;base64,"+LOGO_B64;
  },300);
}

buildQR();
loadRemote();
setInterval(loadRemote,30000);
</script>
